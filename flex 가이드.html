<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex 가이드</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        header{
            text-align: center;
        }
        section{
            width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .div{
            width: 300px;
            text-align: center;
            border: 1px solid black;
            border-radius: 10px;
            height: 100px;
        }
        .div a{
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>
    <div class="all">
        <header>
            <h1>김채현의 홈페이지</h1>
        </header>
        <section>
            <div class="div">
                <h3>티몬 홈페이지</h3>
                <a href="#">클릭하세요~</a>
            </div>
            <div class="div">
                <h3>티몬 홈페이지</h3>
                <a href="#">클릭하세요~</a>
            </div>
            <div class="div">
                <h3>티몬 홈페이지</h3>
                <a href="#">클릭하세요~</a>
            </div>
        </section>
    </div>
</body>
</html>
